# ======================================================
# CONFIGURACIÃ“N GENERAL
# ======================================================
spring.application.name=playstop-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.main.lazy-initialization=true

# ======================================================
# BASE DE DATOS (NEON TECH)
# ======================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ConfiguraciÃ³n de HikariCP (Optimizado para el plan gratuito de Render)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.initialization-fail-timeout=0

# ======================================================
# JPA / HIBERNATE
# ======================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ======================================================
# SEGURIDAD Y JWT
# ======================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ======================================================
# CORREO ELECTRÃ“NICO
# ======================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.test-connection=false
app.mail.from=${MAIL_FROM:principemerinosheila@gmail.com}

# ======================================================
# SERVIDOR Y PUERTO
# ======================================================
server.port=${PORT:8080}

# ======================================================
# GESTIÃ“N DE ARCHIVOS Y RUTAS
# ======================================================
app.upload.dir=${UPLOAD_DIR:/tmp/uploads}
app.base-url=${APP_BASE_URL:http://localhost:8080}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ======================================================
# LOGGING
# ======================================================
logging.level.root=WARN
logging.level.com.playstop=INFO


# ======================================================
# ACTUATOR (HEALTH CHECK)
# ======================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.db.enabled=false


# ======================================================
# JACKSON (SERIALIZACION JSON)
# ======================================================



# ======================================================
# TAREAS PROGRAMADAS
# ======================================================
spring.task.scheduling.pool.size=3


# ======================================================
# ERRORES
# ======================================================
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never


# ======================================================
# CACHE JPA
# ======================================================
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.generate_statistics=false


# ======================================================
# COMPRESION HTTP
# ======================================================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html
server.compression.min-response-size=1024


# ======================================================
# TIMEOUT DE PETICIONES
# ======================================================
spring.mvc.async.request-timeout=30000


# ======================================================
# FORMATO DE FECHA
# ======================================================
spring.mvc.format.date=yyyy-MM-dd
spring.mvc.format.date-time=yyyy-MM-dd'T'HH:mm:ss


# ======================================================
# WHATSAPP / TWILIO
# ======================================================
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.whatsapp.from=${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}

# ======================================================
# CLOUDINARY
# ======================================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ======================================================
# GOOGLE OAUTH2
# ======================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/auth/oauth2/callback/google

# ======================================================
# FIREBASE (FCM PUSH NOTIFICATIONS)
# ======================================================
# Pegar el JSON completo de la service account como valor de la variable de entorno
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}

# ======================================================
# ANTHROPIC (CLAUDE API)
# ======================================================
anthropic.api-key=${ANTHROPIC_API_KEY:}

# ======================================================
# INFORMACION DE LA APP
# ======================================================
info.app.name=PlayStop Backend
info.app.version=1.0.0
info.app.description=API de reservas de canchas deportivas

